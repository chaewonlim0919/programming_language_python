<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event1</title>
    <script> 
    /*Event handler function*/
        function func(){
            let dateTime = "2026-3-3";
            let arrData = dateTime.split("-");
            //document.write(`${arrData[0]}년 ${arrData[1]}월 ${arrData[2]}일`);
            console.log(`${arrData[0]}년 ${arrData[1]}월 ${arrData[2]}일`);
        }
    </script>
</head>
<body>
    <h2>이벤트 처리 이해</h2>
    <a href="https://www.naver.com">네이버</a><br>
    <a href="javascript:func()">이벤트 처리 함수 호출1(이벤트 핸들러가 지금 X -> on~~)</a><br>

    <h4>이벤트 핸들러 이용(on)</h4>
    <pre style="font-size: 17px;">
    이벤트 핸들러는 on이벤트종류= 핸들러함수()
    </pre>
    <a href="javascript:onclick=func()">이벤트 처리 함수 호출2(onclick)</a><br>
    <!--이미 CSS가 걸려있어, 마우스 over out ,-->
    <button onclick="func()">이벤트 처리 함수 호출3(button)</button><br><!-- formtag 바깥에서 주로씀-->
    <input type="button" onclick="func()" value=" 이벤트 처리 함수 호출4(button)" /><br>
    
</body>
</html>
