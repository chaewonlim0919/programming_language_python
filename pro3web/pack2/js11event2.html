<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event2</title>
    <script type="text/javascript">
        /*Event handler function*/
        function colorFunc(){
            window.document.body.bgColor = document.frm.bc.value;
            document.body.text =document.frm.tc.value;
        }   
    </script>
</head>
<body>
    <h4>이벤트 연습 : 색 변경 </h4>
    <form name="frm">
        <table border="1" width="200">
            <tr>
                <td colspan="2" style="text-align: center;">색상 선택</td>
            </tr>
            <tr>
                <td><b>배경색</b></td>
                <td style="text-align: center;">
                    <!--select는 on change, on click의 이벤트를 가지고 있음-->
                    <select name="bc">
                        <option value="black"> 검정</option>
                        <option value="blue">  파랑</option>
                        <option value="green"> 초록</option>
                        <option value="white" selected> 하양</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><b>글자색</b></td>
                <td style="text-align: center;">
                    <select name="tc">
                        <option value="black" selected> 검정</option>
                        <option value="blue">  파랑</option>
                        <option value="green"> 초록</option>
                        <option value="white"> 하양</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td colspan="2" style="text-align: center;">
                    <!--colorFunc() : colorFunc를 실행할꺼야 -> ()가 없으면 실행 안됨! -->
                    <input type="button" value="변 경" onclick="colorFunc()"/>
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
