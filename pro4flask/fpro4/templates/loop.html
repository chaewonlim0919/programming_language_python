<!-- base.html의 모양을 적용! - 레이아웃을 적용 -->
{% extends "base.html" %}


{% block title %}반복{% endblock %}
    

{% block content %}
    <h3>반복문 예제</h3>
    <ul>
        <!-- for block -->
        {% for user in users %}
        <!-- <li>{{user}}</li> -->
        
        <!-- loop.index는 1부터 시작한다! -->
        <li>{{loop.index}}번째 사람 : {{user}}</li>
        
        {% endfor %}
    </ul>
        <!-- option, filter {{묶음변수  | length}}-->
    <p>총 인원 : {{users | length}}</p>
    
{% endblock %}
