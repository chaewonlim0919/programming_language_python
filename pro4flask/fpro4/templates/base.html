<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--공통 title 레이아웃 생성! , endblock띄어쓰기 주의!-->  
    <title>{% block title%}기본 제목{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!--공통 body 레이아웃 생성!-->
    <!--머리글 header-->
    <h2>공통 상단 메뉴(머리글 header)</h2>
    <hr>
    <!--block 생성 각각의 html마다 내용이 다를거야!-->
    {% block content %}
        기본 내용
    {% endblock %}
    <hr>

    
    <!-- 공통 바닥글(footer))-->
    <footer class="bg-ligth text-center">
        <span class="text-muted">작성자 : 홍길동 (주)에이콘 (전화)02-111-2222</span>
    </footer>
</body>
</html>
