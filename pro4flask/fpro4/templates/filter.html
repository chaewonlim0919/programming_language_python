<!-- base.html의 모양을 적용! - 레이아웃을 적용 -->
{% extends "base.html" %}


{% block title %}필터{% endblock %}
    

{% block content %}
    <h3>필터 옵션 사용</h3>
    원본 메세지 : {{message}}<br>
    대문자로(upper) : {{message | upper}}<br>
    첫글자 대문자로(capitalize) : {{message | capitalize}}<br>
    단어별 첫글자 대문자로(title) : {{message | title}}<br>
    가격 : {{price}}
{% endblock %}
