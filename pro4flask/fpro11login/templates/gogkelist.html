<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gogek_list</title>
</head>
<body>
    <h2>담당 고객 정보</h2>
    <p>직원 : <b>{{empname}}</b> ({{empno}})</p>

    <!-- 고객을 담당하고 있는 직원 -->
    <table border="1">
        <tr>
            <th>고객번호</th><th>고객명</th><th>전화</th>
        </tr>
        {% if customers %}
            {% for c in customers %}
                <tr>
                    <td>{{c.gogekno}}</td>
                    <td>{{c.gogekname}}</td>
                    <td>{{c.gogektel}}</td>
                </tr>
            {% endfor %}
        {% else %}
            
            <tr>
                    <td colspan="3">담당 고객이 없어요</td>
                </tr>
            {% endif %}
    </table>
    <a href="{{url_for('jikwon_list')}}">직원 목록으로</a>
</body>
</html>
